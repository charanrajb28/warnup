steps:
  # Build the Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/clearpath:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/clearpath:latest'
      - '.'

  # Push to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/clearpath:$COMMIT_SHA']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/clearpath:latest']

  # Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'clearpath'
      - '--image=gcr.io/$PROJECT_ID/clearpath:$COMMIT_SHA'
      - '--region=us-central1'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--port=8080'
      - '--memory=1Gi'
      - '--cpu=1'
      - '--set-env-vars=NODE_ENV=production'
      # GEMINI_API_KEY is set via Cloud Run secret manager, not here

images:
  - 'gcr.io/$PROJECT_ID/clearpath:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/clearpath:latest'

options:
  logging: CLOUD_LOGGING_ONLY
